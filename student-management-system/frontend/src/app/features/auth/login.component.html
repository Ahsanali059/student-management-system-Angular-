<div class="min-h-screen bg-google-surface flex items-center justify-center p-6 animate-fade-in">
  <div class="w-full max-w-md bg-white rounded-[2rem] shadow-google-elevation p-10 space-y-8">
    <!-- Brand Header -->
    <div class="flex flex-col items-center text-center space-y-4">
      <img src="/images/logo.png" class="w-20 h-20 object-contain drop-shadow-sm" alt="School Logo">
      <div>
        <h1 class="text-3xl font-medium text-google-text tracking-tight">Sign in</h1>
        <p class="text-google-text-secondary text-sm mt-2">Use your Student Portal Account</p>
      </div>
    </div>

    <!-- Login Form -->
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-4">
      <mat-form-field appearance="outline">
        <mat-label>Email or Username</mat-label>
        <input matInput formControlName="username" placeholder="name@example.com">
        <mat-icon matPrefix class="mr-2 opacity-50 scale-75">person_outline</mat-icon>
        <mat-error *ngIf="loginForm.get('username')?.hasError('required')">
          Identification is required
        </mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Password</mat-label>
        <input matInput [type]="hidePassword ? 'password' : 'text'" formControlName="password">
        <mat-icon matPrefix class="mr-2 opacity-50 scale-75">lock_outline</mat-icon>
        <button type="button" mat-icon-button matSuffix (click)="hidePassword = !hidePassword" class="opacity-50">
          <mat-icon class="scale-75">{{hidePassword ? 'visibility_off' : 'visibility'}}</mat-icon>
        </button>
        <mat-error *ngIf="loginForm.get('password')?.hasError('required')">
          Security key is required
        </mat-error>
      </mat-form-field>

      <div class="flex items-center justify-between pb-4">
        <button type="button" mat-button color="primary" class="!px-0 !text-xs !font-bold">Forgot email?</button>
      </div>

      <div class="flex flex-col gap-4">
        <button mat-raised-button color="primary" class="!w-full !py-7 !text-sm !font-bold transition-all"
          [disabled]="loginForm.invalid || loading">
          <div class="flex items-center justify-center gap-2">
            <span *ngIf="!loading">Sign in</span>
            <mat-spinner *ngIf="loading" diameter="20" strokeWidth="3"></mat-spinner>
          </div>
        </button>

        <div class="text-center mt-6">
          <p class="text-xs text-google-text-secondary">
            Don't have an account?
            <a routerLink="/register" class="text-google-blue font-bold hover:underline ml-1">Create account</a>
          </p>
        </div>
      </div>
    </form>

    <!-- Footer -->
    <div
      class="pt-6 border-t border-black/5 flex justify-between items-center text-[10px] text-google-text-secondary font-medium tracking-wide">
      <span>English (United States)</span>
      <div class="flex gap-4 uppercase">
        <a class="hover:underline cursor-pointer">Help</a>
        <a class="hover:underline cursor-pointer">Privacy</a>
        <a class="hover:underline cursor-pointer">Terms</a>
      </div>
    </div>
  </div>
</div>
