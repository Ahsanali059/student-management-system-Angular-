<div class="space-y-6 animate-fade-in px-2">
    <!-- Header Section (M3 style) -->
    <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
        <div>
            <h1 class="text-2xl font-medium text-google-text">Daily Attendance</h1>
            <p class="text-xs text-google-text_secondary">Tracking student presence across sections</p>
        </div>

        <div class="flex gap-2 w-full md:w-auto">
            <mat-form-field appearance="outline" class="!w-48 !mb-0">
                <mat-label>Academic Class</mat-label>
                <input matInput placeholder="e.g. 10A">
            </mat-form-field>
            <button mat-raised-button color="primary" class="!h-[56px]">
                <div class="flex items-center gap-2">
                    <mat-icon class="scale-90">save</mat-icon>
                    <span>Commit Registry</span>
                </div>
            </button>
        </div>
    </div>

    <!-- Attendance Grid (M3 Style Clean List) -->
    <div class="bg-white border border-black/5 rounded-[1.5rem] overflow-hidden">
        <div class="p-6 border-b border-black/5 flex items-center justify-between bg-google-surface/30">
            <h3 class="text-sm font-bold text-google-text_secondary uppercase tracking-widest">Attendance Sheet</h3>
            <div class="flex gap-4">
                <div class="flex items-center gap-2">
                    <div class="w-3 h-3 rounded-full bg-emerald-500"></div>
                    <span class="text-[10px] font-bold text-google-text_secondary">Present</span>
                </div>
                <div class="flex items-center gap-2">
                    <div class="w-3 h-3 rounded-full bg-rose-500"></div>
                    <span class="text-[10px] font-bold text-google-text_secondary">Absent</span>
                </div>
            </div>
        </div>

        <div class="divide-y divide-black/5">
            <div *ngFor="let student of attendanceData"
                class="flex items-center justify-between p-4 px-8 hover:bg-google-surface_container/30 transition-colors group">
                <div class="flex items-center gap-4 flex-1">
                    <div
                        class="w-10 h-10 rounded-full bg-google-surface_container flex items-center justify-center text-google-text_secondary font-bold text-sm">
                        {{student.name[0]}}
                    </div>
                    <div>
                        <p class="text-sm font-medium text-google-text">{{student.name}}</p>
                        <p class="text-[10px] text-google-text_secondary font-medium">Roll No: #{{student.rollNumber}}
                        </p>
                    </div>
                </div>

                <div class="flex items-center gap-12">
                    <div class="flex items-center gap-2">
                        <span
                            class="text-[10px] font-black uppercase tracking-widest text-google-text_secondary opacity-0 group-hover:opacity-100 transition-opacity">Status</span>
                        <div class="flex bg-google-surface p-1 rounded-google-full border border-black/5 shadow-inner">
                            <button
                                class="px-6 py-2 rounded-google-full text-[10px] font-black uppercase tracking-widest transition-all"
                                [ngClass]="student.status === 'Present' ? 'bg-emerald-500 text-white shadow-lg' : 'text-google-text_secondary hover:bg-black/5'">
                                P
                            </button>
                            <button
                                class="px-6 py-2 rounded-google-full text-[10px] font-black uppercase tracking-widest transition-all"
                                [ngClass]="student.status === 'Absent' ? 'bg-rose-500 text-white shadow-lg' : 'text-google-text_secondary hover:bg-black/5'">
                                A
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="p-6 bg-google-surface border-t border-black/5 flex items-center justify-between">
            <span class="text-xs text-google-text_secondary italic">Last synced with central server 2m ago</span>
            <button mat-button class="!text-google-blue !font-bold !text-xs !tracking-wider uppercase">Download
                Snapshot</button>
        </div>
    </div>
</div>
