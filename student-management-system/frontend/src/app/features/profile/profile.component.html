<div class="max-w-4xl mx-auto space-y-10 animate-fade-in py-10">
    <!-- Profile Header -->
    <div class="flex flex-col items-center text-center space-y-6">
        <div class="relative group">
            <div
                class="w-32 h-32 rounded-full bg-google-blue/10 flex items-center justify-center text-google-blue font-bold text-[3rem] border-4 border-white shadow-xl group-hover:bg-google-blue group-hover:text-white transition-all cursor-pointer">
                {{ user.username[0] | uppercase }}
            </div>
            <div
                class="absolute bottom-1 right-1 w-8 h-8 bg-google-blue text-white rounded-full flex items-center justify-center shadow-lg border-2 border-white">
                <mat-icon class="scale-50">edit</mat-icon>
            </div>
        </div>

        <div>
            <h1 class="text-3xl font-medium text-google-text">{{ user.username }}</h1>
            <p class="text-google-text-secondary font-medium tracking-widest uppercase text-xs mt-1">{{
                user.roles.join(', ') }}</p>
        </div>
    </div>

    <!-- Info Sections (M3 Cards) -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div class="bg-google-surface-container p-8 rounded-[2rem] border border-black/5 space-y-6">
            <div class="flex items-center gap-4 mb-4">
                <mat-icon class="text-google-blue">manage_accounts</mat-icon>
                <h3 class="text-sm font-bold text-google-text uppercase tracking-widest">Account Details</h3>
            </div>

            <div class="space-y-4">
                <div>
                    <label class="text-[10px] font-black uppercase tracking-widest text-google-text-secondary">Official
                        Email</label>
                    <p class="text-sm font-medium text-google-text">{{ user.email }}</p>
                </div>
                <div>
                    <label class="text-[10px] font-black uppercase tracking-widest text-google-text-secondary">Portal
                        Access ID</label>
                    <p class="text-sm font-medium text-google-text">#ACC-00{{ user.id }}</p>
                </div>
            </div>
        </div>

        <div class="bg-google-surface-container p-8 rounded-[2rem] border border-black/5 space-y-6">
            <div class="flex items-center gap-4 mb-4">
                <mat-icon class="text-amber-500">security</mat-icon>
                <h3 class="text-sm font-bold text-google-text uppercase tracking-widest">Security Settings</h3>
            </div>

            <div class="space-y-2">
                <button mat-button
                    class="!w-full !justify-start !text-xs !font-bold !text-google-text-secondary !py-2 hover:!bg-black/5 !rounded-google-full">
                    Change Access Password
                </button>
                <button mat-button
                    class="!w-full !justify-start !text-xs !font-bold !text-google-text-secondary !py-2 hover:!bg-black/5 !rounded-google-full">
                    Configure 2FA Recovery
                </button>
            </div>
        </div>
    </div>

    <!-- Actions -->
    <div class="flex justify-center pt-10">
        <button mat-raised-button color="warn" class="!bg-rose-600 !px-12 !h-14">
            <div class="flex items-center gap-3">
                <mat-icon class="scale-90">exit_to_app</mat-icon>
                <span>Deactivate Session</span>
            </div>
        </button>
    </div>
</div>
